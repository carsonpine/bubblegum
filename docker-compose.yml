services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: solana_indexer
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:23-alpine
    environment:
      CLICKHOUSE_DB: solana_indexer
      CLICKHOUSE_USER: indexer
      CLICKHOUSE_PASSWORD: changeme
    volumes:
      - chdata:/var/lib/clickhouse
      - ./init_ch.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  indexer:
    image: ghcr.io/carsonpine/bubblegum:${IMAGE_TAG:-latest}
    environment:
      HELIUS_RPC_URL: ${HELIUS_RPC_URL}
      POSTGRES_URL: postgres://indexer:changeme@postgres:5432/solana_indexer
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: indexer
      CLICKHOUSE_PASSWORD: changeme
      PROGRAM_ID: ${PROGRAM_ID}
      START_SLOT: ${START_SLOT}
      END_SLOT: ${END_SLOT}
      BATCH_SIZE: ${BATCH_SIZE:-100}
      IDL_PATH: ${IDL_PATH}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  chdata:

