version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bubblegum-postgres
    environment:
      POSTGRES_DB: solana_indexer
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "indexer", "-d", "solana_indexer"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:23-alpine
    container_name: bubblegum-clickhouse
    environment:
      CLICKHOUSE_DB: solana_indexer
      CLICKHOUSE_USER: indexer
      CLICKHOUSE_PASSWORD: changeme
    volumes:
      - chdata:/var/lib/clickhouse
    ports:
      - "8123:8123"

  indexer:
    image: ghcr.io/carsonpine/bubblegum:latest
    container_name: bubblegum-indexer
    environment:
      HELIUS_RPC_URL: https://mainnet.helius-rpc.com/?api-key=YOUR_API_KEY
      PROGRAM_ID: LBUZKhRxPF3XUpBCjp4YzTKgLccjZhTSDM9YuVaPwxo
      POSTGRES_URL: postgres://indexer:changeme@postgres:5432/solana_indexer
      CLICKHOUSE_URL: http://clickhouse:8123
      IDL_PATH: /app/idl.json
      START_SLOT: "300000000"
      END_SLOT: "300010000"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - clickhouse

volumes:
  pgdata:
  chdata:
